<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Primary Infusion</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin:0; padding:16px; }
    #page { margin:auto; width:100%; max-width:900px; }
    .row { display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .col { display:flex; align-items:center; gap:8px; }
    button { padding:10px 14px; border:1px solid #ccc; border-radius:8px; background:#f6f6f6; cursor:pointer; }
    button:hover { background:#eee; }
    textarea { width:100%; height:60vh; font-size:5pt; }
    input[type="text"] { width:6ch; text-align:center; }
    .small { font-size:12px; color:#666; }
  </style>
</head>
<body>
  <div id="page">
    <div class="row" style="margin-bottom:8px;">
      <div class="col" style="flex:1;">
        <button id="play" style="flex:1;">Play</button>
      </div>
      <div class="col" style="flex:1; justify-content:flex-end;">
        <button id="step" style="flex:1;">Step</button>
      </div>
    </div>

    <div class="row" style="margin-bottom:8px;">
      <div class="col">
        <button id="scorebtn">mistake</button>
        <input id="score" type="text" value="0" read-only>
      </div>
      <div class="col">
        <input type="checkbox" id="soundCheckbox" checked>
        <label for="soundCheckbox">sound</label>
        <span class="small" id="status"></span>
      </div>
    </div>
  </br>
    <div id="txtarea">
      <textarea id="textArea">
Review chart, orders and mar
   Order is complete, dated, and signed
   MAR matches orders
Enter room - bring chart, gloves, NS syringe, alcohol swab
Hand hygiene
Intro (self, role)
Patient verification - name, DOB - verbalized, chart, bracelet
ask allergies
Explain orders and obtain consent
Assess IV site - wear gloves
   Dressing dry and intact
   No leaking Redness, pain, swelling
   check Patency
   Purge air from saline syringe
   Clean saline lock with alcohol (state 30 seconds wipe, 30 seconds dry)
   Check for blood return
   Flush with 3ml pulsatile assessing site
   Hand hygiene, leave room
Prepare line
   Calculate IV flow rate: hours/mL
   Select correct fluid bag and inspect it for leakage, particulate, expiry
   Stop - Med rights
       compare to chart/MAR - patient, med, dose, flow rate, time/freq, route, reason
   Prepare label
   Collect fluid bag, alcohol swab, and primary tubing
Prime line
   Hand hygiene
   Hang IV solution on pole and remove blue cap
   Remove tubing from package and move clamp closer to drip chamber and close it
   Spike bag using aseptic technique
   fill drip chamber
   Slowly open clamp and fill tubing, invert Y ports as fluid reaches them while tapping air out
   Close clamp once line is full
   Apply label to tubing
Stop - Med rights
   compare to chart/MAR - patient, med, dose, flow rate (double check), time/freq, route, reason
Attach tubing and program pump
Hand hygiene, enter room with saline, primed and labeled tubing, alcohol swab, chart
Stop Med rights again 
   compare to chart/MAR - patient, med, dose, flow rate (double check), time/freq, route, reason
Cleanse saline lock on patient with alcohol swab (30 seconds wipe, 30 seconds dry)
Attach primary tubing to saline lock maintaining sterility
Program pump
   Press ON button
   New patient? YES
   Move slide clamp (key) up to 12" from drip chamber
   Load key into slot on top right of pump to open door
   Load tubing into designated slots from top to bottom
   Close door and pull out blue key
   Open roller clamp should be no dripping into chamber yet
   select Care area - med surg
   Drug selection - IV
   Select NS or D5W
   Rate/VTBI/TIME
   Press RUN
   Check flow screen - double check that clamp and key are open, no kinks in line, drops are entering chamber
   Press YES	
Wrap up
Check that line is running
Remind patient of call bell
Hand hygiene, leave room
Verbalize that documentation would be done according to policy
      </textarea>
    </div>
  </div>

  <audio id="ttsAudio" preload="auto"></audio>

  <script>
    // Replace with your Worker URL:
    const WORKER_URL = "https://postpartum-tts.chris8331.workers.dev/api/tts"; 
    const VOICE = "en-US-JennyNeural";
    const FORMAT = "audio-24khz-48kbitrate-mono-mp3";

    let lines = [];
    let index = 0;
    let playing = false;

    const playBtn = document.getElementById("play");
    const stepBtn = document.getElementById("step");
    const scoreBtn = document.getElementById("scorebtn");
    const scoreInput = document.getElementById("score");
    const textArea = document.getElementById("textArea");
    const soundCheckbox = document.getElementById("soundCheckbox");
    const audioEl = document.getElementById("ttsAudio");
    const statusEl = document.getElementById("status");

    function setStatus(msg) { statusEl.textContent = msg || ""; }

    async function speak(text) {
      if (!soundCheckbox.checked || !text.trim()) return;

      // Try Cloud TTS
      try {
        setStatus("cloud TTS…");
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, voice: VOICE, format: FORMAT })
        });
        if (!res.ok) throw new Error(await res.text());
        const blob = await res.blob();
        if (blob.size < 2000) throw new Error("Empty audio");
        audioEl.src = URL.createObjectURL(blob);
        await audioEl.play();
        setStatus("");
        return; // success
      } catch (err) {
        console.warn("Cloud TTS failed, falling back:", err);
        setStatus("cloud TTS failed → local voice");
      }

      // Fallback: browser speechSynthesis
      try {
        const utter = new SpeechSynthesisUtterance(text);
        const voices = speechSynthesis.getVoices();
        utter.voice = voices.find(v => v.lang === "en-US") || voices.find(v => v.lang.startsWith("en")) || null;
        utter.rate = 1.0;
        utter.pitch = 1.0;
        speechSynthesis.speak(utter);
      } catch (err) {
        console.error("Local TTS also failed:", err);
        setStatus("all TTS failed");
      }
    }

    playBtn.addEventListener("click", function() {
      if (playing) return;
      playing = true;
      lines = textArea.value.split("\n");
      textArea.value = "";
      index = 0;
      playLines();
    });

    stepBtn.addEventListener("click", function() {
      if (index === 0) {
        lines = textArea.value.split("\n");
        textArea.value = "";
      }
      if (index <= lines.length && index !== 0) {
        const line = lines[index - 1];
        textArea.value += line + "\n";
        textArea.scrollTop = textArea.scrollHeight;
        speak(line);
      }
      index++;
    });

    scoreBtn.addEventListener("click", function() {
      scoreInput.value = parseInt(scoreInput.value, 10) + 1;
      textArea.value += "*** ^ ***\n";
    });

    function playLines() {
      if (index >= lines.length) {
        playing = false;
        return;
      }
      const line = lines[index];
      textArea.value += line + "\n";
      textArea.scrollTop = textArea.scrollHeight;
      speak(line);
      index++;
      setTimeout(playLines, 3000);
    }
  </script>
</body>
</html>
